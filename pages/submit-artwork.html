<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" sizes="180x180" href="../favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../favicon_io/favicon-16x16.png">
    <link rel="manifest" href="../favicon_io/site.webmanifest">
    <title>Submit Artwork | Art Link</title>
    <link rel="stylesheet" href="../css/base/reset.css">
    <link rel="stylesheet" href="../css/base/variables.css">
    <link rel="stylesheet" href="../css/base/typography.css">
    <link rel="stylesheet" href="../css/layout/grid.css">
    <link rel="stylesheet" href="../css/components/navbar.css">
    <link rel="stylesheet" href="../css/components/footer.css">
    <link rel="stylesheet" href="../css/components/buttons.css">
    <link rel="stylesheet" href="../css/components/forms.css">
    <link rel="stylesheet" href="../css/pages/submit-artwork.css">
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>

<body data-root="..">
    <a class="skip-link" href="#main">Skip to content</a>
    <div id="navbar-slot"></div>

    <main id="main" class="page-content" role="main">
        <header class="page-hero container">
            <h1>Submit Your Artwork</h1>
            <p class="sub">Share your creations with the world. Fill out the form below to submit your artwork for consideration.</p>
        </header>

        <section class="submit-wrapper container">
            <div class="submit-card">
                <h2>Artwork Details</h2>
                <form id="artworkForm" action="https://docs.google.com/forms/d/e/1FAIpQLSdiox3ORipHBCllIiCAV9tJTR2yJuJEIYL7Sq8enU3KTuCRkg/formResponse" method="POST" target="artworkFormTarget" novalidate aria-describedby="submitStatus">
                    <div class="form-row">
                        <label for="artistName">Artist Name</label>
                        <input id="artistName" name="entry.268652548" type="text" required placeholder="Your full name">
                    </div>
                    <div class="form-row">
                        <label for="artistEmail">Email Address</label>
                        <input id="artistEmail" name="entry.913978995" type="email" required placeholder="you@example.com">
                    </div>
                    <div class="form-row">
                        <label for="artistBio">Artist Bio (Optional)</label>
                        <textarea id="artistBio" name="entry.852011739" rows="3" placeholder="Tell us about yourself"></textarea>
                    </div>
                    <div class="form-row">
                        <label for="artworkTitle">Artwork Title</label>
                        <input id="artworkTitle" name="entry.1667814257" type="text" required placeholder="Title of your artwork">
                    </div>
                    <div class="form-row">
                        <label for="artworkDescription">Description</label>
                        <textarea id="artworkDescription" name="entry.2009632723" rows="4" required placeholder="Describe your artwork"></textarea>
                    </div>
                    <div class="form-row">
                        <label for="artworkCategory">Category</label>
                        <select id="artworkCategory" name="entry.260939664" required>
                            <option value="">Select a category</option>
                            <option value="Painting">Painting</option>
                            <option value="Sculpture">Sculpture</option>
                            <option value="Photography">Photography</option>
                            <option value="Digital Art">Digital Art</option>
                            <option value="Mixed Media">Mixed Media</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label for="artworkImage">Artwork Image</label>
                        <p class="muted">Image upload is not supported with Google Forms submission. Please send images separately if needed.</p>
                    </div>
                    <div class="form-row">
                        <label for="artworkPrice">Price (Optional)</label>
                        <input id="artworkPrice" name="entry.716626582" type="number" min="0" step="0.01" placeholder="0.00">
                    </div>
                    <div class="form-row small">
                        <label>
                            <input type="checkbox" id="consent" name="entry.277459112" value="I agree to have my artwork displayed on the website and allow visitors to contact me" required>
                            I agree to have my artwork displayed on the website and allow visitors to contact me
                        </label>
                    </div>
                    <div class="form-row">
                        <button type="submit" class="btn primary">Submit Artwork</button>
                    </div>
                    <div id="submitStatus" class="status sr-only" role="status" aria-live="polite"></div>
                </form>
                <iframe id="artworkFormTarget" name="artworkFormTarget" class="sr-only hidden-iframe" aria-hidden="true"></iframe>
            </div>
        </section>
    </main>

    <div id="footer-slot"></div>

    <script type="module" src="../js/main.js"></script>
</body>

</html>
