<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" sizes="180x180" href="../favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../favicon_io/favicon-16x16.png">
    <link rel="manifest" href="../favicon_io/site.webmanifest">
    <title>Gallery | Art Link</title>
    <link rel="stylesheet" href="../css/base/reset.css">
    <link rel="stylesheet" href="../css/base/variables.css">
    <link rel="stylesheet" href="../css/base/typography.css">
    <link rel="stylesheet" href="../css/layout/grid.css">
    <link rel="stylesheet" href="../css/components/navbar.css">
    <link rel="stylesheet" href="../css/components/footer.css">
    <link rel="stylesheet" href="../css/pages/gallery.css">
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>

<body data-root="..">
    <div id="navbar-slot"></div>

    <main>
        <header class="gallery-header section container">
            <h1 class="gallery-title">Featured Works</h1>
            <p class="gallery-sub">A curated selection of visual experiments</p>
        </header>

        <section class="gallery-grid container" aria-label="Artwork gallery" id="galleryGrid">
            <!-- Artworks will be loaded here -->
        </section>

        <div class="viewer" aria-hidden="true">
            <button type="button" class="close" aria-label="Close viewer">&times;</button>
            <img id="viewer-img" src="" alt="Expanded artwork">
            <div class="artwork-info" id="artworkInfo">
                <h3 id="artworkTitle"></h3>
                <p id="artworkDescription"></p>
                <p><strong>Artist:</strong> <span id="artistName"></span></p>
                <p><strong>Category:</strong> <span id="artworkCategory"></span></p>
                <p id="artworkPrice"></p>
                <button id="contactArtist" class="btn secondary">Contact Artist</button>
            </div>
        </div>
    </main>
    </main>

    <div id="footer-slot"></div>

    <script type="module" src="../js/main.js"></script>
    <script type="module">
        import { on, qs, qsa } from "../js/utils/helpers.js";

        async function loadArtworks() {
            try {
                const response = await fetch("/data/artworks.json");
                const artworks = await response.json();
                const approvedArtworks = artworks.filter(artwork => artwork.approved);

                const galleryGrid = qs("#galleryGrid");
                galleryGrid.innerHTML = "";

                approvedArtworks.forEach(artwork => {
                    const item = document.createElement("div");
                    item.className = "item";
                    item.innerHTML = `<img src="${artwork.imagePath}" alt="${artwork.artworkTitle}" data-artwork-id="${artwork.id}">`;
                    galleryGrid.appendChild(item);
                });

                // Reinitialize gallery viewer with new items
                initGalleryViewer();
            } catch (error) {
                console.error("Failed to load artworks:", error);
            }
        }

        function initGalleryViewer() {
            const viewer = qs(".viewer");
            const viewerImg = qs("#viewer-img");
            const closeBtn = qs(".close");
            const galleryGrid = qs("#galleryGrid");
            const images = qsa("#galleryGrid .item img");
            const artworkInfo = qs("#artworkInfo");
            const artworkTitle = qs("#artworkTitle");
            const artworkDescription = qs("#artworkDescription");
            const artistName = qs("#artistName");
            const artworkCategory = qs("#artworkCategory");
            const artworkPrice = qs("#artworkPrice");
            const contactArtistBtn = qs("#contactArtist");

            if (!viewer || !viewerImg || !closeBtn || !galleryGrid || !images.length) {
                return;
            }

            const openViewer = (img) => {
                const artworkId = img.dataset.artworkId;
                fetch("/data/artworks.json")
                    .then(response => response.json())
                    .then(artworks => {
                        const artwork = artworks.find(a => a.id === artworkId);
                        if (artwork) {
                            viewerImg.src = img.src;
                            viewerImg.alt = img.alt;
                            artworkTitle.textContent = artwork.artworkTitle;
                            artworkDescription.textContent = artwork.artworkDescription;
                            artistName.textContent = artwork.artistName;
                            artworkCategory.textContent = artwork.artworkCategory;
                            artworkPrice.textContent = artwork.artworkPrice ? `Price: $${artwork.artworkPrice}` : "";
                            contactArtistBtn.onclick = () => {
                                window.location.href = `contact.html?artist=${encodeURIComponent(artwork.artistEmail)}&subject=${encodeURIComponent(`Inquiry about "${artwork.artworkTitle}"`)}`;
                            };
                            artworkInfo.style.display = "block";
                        }
                    });

                viewer.classList.add("show");
                viewer.setAttribute("aria-hidden", "false");
                document.body.classList.add("no-scroll");
            };

            images.forEach(img => {
                on(img, "click", () => openViewer(img));
            });

            on(closeBtn, "click", () => {
                viewer.classList.remove("show");
                viewer.setAttribute("aria-hidden", "true");
                document.body.classList.remove("no-scroll");
                artworkInfo.style.display = "none";
            });

            on(viewer, "click", (event) => {
                if (event.target === viewer) {
                    viewer.classList.remove("show");
                    viewer.setAttribute("aria-hidden", "true");
                    document.body.classList.remove("no-scroll");
                    artworkInfo.style.display = "none";
                }
            });

            on(document, "keydown", (event) => {
                if (event.key === "Escape") {
                    viewer.classList.remove("show");
                    viewer.setAttribute("aria-hidden", "true");
                    document.body.classList.remove("no-scroll");
                    artworkInfo.style.display = "none";
                }
            });
        }

        loadArtworks();
    </script>
</body>

</html>
