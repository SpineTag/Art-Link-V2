<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" sizes="180x180" href="../favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../favicon_io/favicon-16x16.png">
    <link rel="manifest" href="../favicon_io/site.webmanifest">
    <title>Gallery | Art Link</title>
    <link rel="stylesheet" href="../css/base/reset.css">
    <link rel="stylesheet" href="../css/base/variables.css">
    <link rel="stylesheet" href="../css/base/typography.css">
    <link rel="stylesheet" href="../css/layout/grid.css">
    <link rel="stylesheet" href="../css/components/navbar.css">
    <link rel="stylesheet" href="../css/components/footer.css">
    <link rel="stylesheet" href="../css/pages/gallery.css">
</head>

<body data-root="..">
    <div id="navbar-slot"></div>

    <main>
        <header class="gallery-header section container">
            <h1 class="gallery-title">Featured Works</h1>
            <p class="gallery-sub">A curated selection of visual experiments</p>
        </header>

        <section class="gallery-grid container" aria-label="Artwork gallery">
            <div class="item"><img src="https://picsum.photos/900/1200?1" alt="Gallery item 1"></div>
            <div class="item tall"><img src="https://picsum.photos/900/1500?2" alt="Gallery item 2"></div>
            <div class="item wide"><img src="https://picsum.photos/1400/900?3" alt="Gallery item 3"></div>
            <div class="item"><img src="https://picsum.photos/900/1200?4" alt="Gallery item 4"></div>
            <div class="item tall"><img src="https://picsum.photos/900/1500?5" alt="Gallery item 5"></div>
            <div class="item"><img src="https://picsum.photos/900/1200?6" alt="Gallery item 6"></div>
            <div class="item wide"><img src="https://picsum.photos/1400/900?7" alt="Gallery item 7"></div>
            <div class="item tall"><img src="https://picsum.photos/900/1500?8" alt="Gallery item 8"></div>
        </section>

        <div class="viewer" aria-hidden="true">
            <button type="button" class="close" aria-label="Close viewer">&times;</button>
            <img id="viewer-img" src="" alt="Expanded artwork">
        </div>
    </main>

    <div id="footer-slot"></div>

    <script type="module" src="../js/main.js"></script>
</body>

</html>
